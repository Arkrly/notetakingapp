# ===== SERVER =====
server.port=8080

# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/notetakingapp
spring.datasource.username=notetakingapp_user
spring.datasource.password=notetakingapp_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== FLYWAY =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== JWT =====
app.jwt.secret=cGWQhI6rLabkMlfHacubRsK80aBqdoxJDy+nOU0haSg=
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ===== CORS (uncomment when frontend is ready) =====
# app.cors.allowed-origins=http://localhost:4200

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== SWAGGER =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs