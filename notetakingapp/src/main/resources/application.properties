# ===== SERVER =====
server.port=${SERVER_PORT:8080}

# ===== DATABASE =====
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:notetakingapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:notetakingapp_user}
spring.datasource.password=${DATABASE_PASSWORD:notetakingapp_pass}
spring.datasource.driver-class-name=org.h2.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== FLYWAY =====
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== JWT =====
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=${JWT_ACCESS_TOKEN_EXPIRY:900000}
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_TOKEN_EXPIRY:604800000}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== SWAGGER =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs