# ===== SERVER =====
server.port=${SERVER_PORT:8080}

# ===== DATABASE =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/notetakingapp}
spring.datasource.username=${DATABASE_USERNAME:notetakingapp_user}
spring.datasource.password=${DATABASE_PASSWORD:notetakingapp_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== FLYWAY =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:cGWQhI6rLabkMlfHacubRsK80aBqdoxJDy+nOU0haSk=}
app.jwt.access-token-expiry-ms=${JWT_ACCESS_TOKEN_EXPIRY:900000}
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_TOKEN_EXPIRY:604800000}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== SWAGGER =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs