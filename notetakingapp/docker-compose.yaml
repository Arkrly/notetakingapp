services:
  postgres:
    image: postgres:16-alpine
    container_name: notetakingapp-db
    environment:
      POSTGRES_DB: notetakingapp
      POSTGRES_USER: notetakingapp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notetakingapp_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notetakingapp_user -d notetakingapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: