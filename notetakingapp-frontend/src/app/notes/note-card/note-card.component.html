<article class="note-card p-6 rounded-2xl shadow-sm border flex flex-col gap-3 group relative cursor-pointer"
         [ngClass]="[bgClass, borderClass]"
         (click)="onEditClick($event)">
  
  <div class="flex justify-between items-start">
    <h3 class="font-bold text-lg text-slate-800 leading-tight">{{ note.title }}</h3>
    <button class="text-slate-600 hover:text-brand-600 transition-colors p-1" (click)="onPinClick($event)">
      <mat-icon [ngClass]="note.isPinned ? 'icon-filled' : 'text-slate-400'">push_pin</mat-icon>
    </button>
  </div>
  
  <p class="text-slate-700 text-sm line-clamp-2">{{ note.content }}</p>
  
  <div class="flex flex-wrap gap-2 mt-2" *ngIf="note.tags?.length">
    <span *ngFor="let tag of note.tags"
          class="px-2 py-0.5 text-[10px] font-bold rounded uppercase whitespace-nowrap"
          [ngClass]="tagBgClass">
      {{ tag }}
    </span>
  </div>
  
  <div class="flex items-center gap-2 mt-4 pt-4 border-t opacity-0 group-hover:opacity-100 transition-opacity"
       [ngClass]="borderClass">
    <button mat-icon-button class="small-icon-btn text-slate-600 hover:text-brand-600" (click)="onEditClick($event)">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button class="small-icon-btn text-slate-600 hover:text-brand-600" (click)="onArchiveClick($event)">
      <mat-icon>archive</mat-icon>
    </button>
    <button mat-icon-button class="small-icon-btn text-slate-600 hover:text-red-600 ml-auto" (click)="onDeleteClick($event)">
      <mat-icon>delete</mat-icon>
    </button>
  </div>
</article>
