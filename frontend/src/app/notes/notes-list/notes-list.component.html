<app-sidebar></app-sidebar>

<main class="main-content min-h-screen pb-24 md:pb-0 md:ml-[280px] gradient-mesh page-content">
  <!-- Top Bar -->
  <header
    class="sticky top-0 z-40 px-6 py-5 flex items-center justify-between gap-4 backdrop-blur-xl bg-white/70 border-b border-slate-200/50"
  >
    <div class="relative flex-1 max-w-xl">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg
          class="w-5 h-5 text-slate-400"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <input
        type="text"
        [formControl]="searchControl"
        placeholder="Search your notes..."
        class="block w-full pl-12 pr-4 py-3 bg-slate-50/80 border border-slate-200/80 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all sm:text-sm shadow-sm placeholder:text-slate-400"
      />
    </div>

    <button
      (click)="openNoteForm()"
      class="hidden md:flex items-center gap-2.5 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white px-5 py-3 rounded-xl font-semibold transition-all duration-200 shadow-lg shadow-indigo-500/25 hover:shadow-xl hover:shadow-indigo-500/40 hover:-translate-y-0.5 active:translate-y-0"
    >
      <svg
        class="w-5 h-5"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      New Note
    </button>
  </header>

  <div class="px-6 py-6">
    <!-- Loading State -->
    <div *ngIf="isLoading$ | async" class="py-20 flex flex-col items-center justify-center">
      <div class="relative">
        <div class="w-12 h-12 border-4 border-indigo-100 rounded-full"></div>
        <div
          class="absolute top-0 left-0 w-12 h-12 border-4 border-indigo-500 rounded-full border-t-transparent animate-spin"
        ></div>
      </div>
      <p class="text-slate-500 text-sm mt-4 font-medium">Loading your notes...</p>
    </div>

    <!-- Content -->
    <ng-container *ngIf="!(isLoading$ | async)">
      <!-- Pinned Section -->
      <ng-container *ngIf="pinnedNotes$ | async as pinnedNotes">
        <section *ngIf="pinnedNotes.length > 0" class="mb-10 animate-fade-in">
          <div class="flex items-center gap-2.5 mb-5">
            <div class="p-1.5 rounded-lg bg-amber-100">
              <svg class="w-4 h-4 text-amber-600" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 17v5"></path>
                <path
                  d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4.76z"
                ></path>
              </svg>
            </div>
            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-500 m-0">
              Pinned Notes
            </h2>
            <span class="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{{
              pinnedNotes.length
            }}</span>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <app-note-card
              *ngFor="let note of pinnedNotes; let i = index"
              [note]="note"
              [style.animation-delay]="i * 50 + 'ms'"
              class="animate-slide-up opacity-0"
              (pinToggle)="togglePin($event)"
              (archiveToggle)="toggleArchive($event)"
              (edit)="openNoteForm($event)"
              (delete)="deleteNote($event)"
            >
            </app-note-card>
          </div>
        </section>
      </ng-container>

      <!-- Others Section -->
      <ng-container *ngIf="otherNotes$ | async as otherNotes">
        <section *ngIf="otherNotes.length > 0" class="animate-fade-in">
          <div class="flex items-center gap-2.5 mb-5">
            <div class="p-1.5 rounded-lg bg-slate-100">
              <svg
                class="w-4 h-4 text-slate-600"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"
                ></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
            </div>
            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-500 m-0">
              All Notes
            </h2>
            <span class="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{{
              otherNotes.length
            }}</span>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <app-note-card
              *ngFor="let note of otherNotes; let i = index"
              [note]="note"
              [style.animation-delay]="i * 50 + 'ms'"
              class="animate-slide-up opacity-0"
              (pinToggle)="togglePin($event)"
              (archiveToggle)="toggleArchive($event)"
              (edit)="openNoteForm($event)"
              (delete)="deleteNote($event)"
            >
            </app-note-card>
          </div>
        </section>
      </ng-container>

<!-- Empty State — shown when notes stream has emitted and is empty -->
<div
  *ngIf="(notes$ | async)?.length === 0"
  class="py-24 flex flex-col items-center justify-center text-center animate-fade-in"
>
  <div class="relative mb-6">
    <div
      class="empty-icon w-24 h-24 bg-gradient-to-br from-indigo-50 to-violet-50 rounded-3xl flex items-center justify-center"
    >
            <svg
              class="w-12 h-12 text-indigo-300"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"
              ></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <line x1="10" y1="9" x2="8" y2="9"></line>
            </svg>
          </div>
          <div
            class="absolute -bottom-2 -right-2 w-8 h-8 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-xl flex items-center justify-center shadow-lg"
          >
            <svg
              class="w-4 h-4 text-white"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </div>
        </div>
        <h3 class="text-xl font-bold text-slate-800 mb-2">No notes yet</h3>
        <p class="text-slate-500 text-sm max-w-sm mb-6">
          {{
            searchControl.value
              ? 'No notes match your search. Try a different term.'
              : 'Start capturing your ideas. Create your first note!'
          }}
        </p>
<button
  *ngIf="!searchControl.value"
  (click)="openNoteForm()"
  class="empty-cta inline-flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white px-6 py-3 rounded-xl font-semibold transition-all duration-200 shadow-lg shadow-indigo-500/25 hover:shadow-xl hover:shadow-indigo-500/40 hover:-translate-y-0.5"
>
          <svg
            class="w-5 h-5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Create Note
        </button>
      </div>
    </ng-container>
  </div>
</main>
