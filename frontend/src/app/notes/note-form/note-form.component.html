<div [style.background-color]="bgStyle" class="note-form-container modal-panel">
  
  <div class="form-header">
    <h2>{{ data.note ? 'Edit Note' : 'New Note' }}</h2>
    <button class="form-close-btn" (click)="onCancel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <mat-dialog-content class="m-0">
    <form [formGroup]="noteForm" id="noteForm" class="note-body" (ngSubmit)="onSubmit()">
      <div>
        <input 
          type="text" 
          formControlName="title" 
          placeholder="Title" 
          class="note-title-input"
        />
      </div>
      
      <div>
        <textarea 
          formControlName="content" 
          placeholder="Start typing your note..." 
          class="note-content-input"
        ></textarea>
      </div>

      <div class="color-section">
        <p class="section-label">Color</p>
        <div class="color-swatches">
          <button 
            *ngFor="let color of colors" 
            type="button"
            (click)="selectColor(color)"
            class="swatch swatch-{{ color }}"
            [class.swatch-selected]="selectedColor === color"
            [attr.aria-label]="'Set note color to ' + color"
          ></button>
        </div>
      </div>

      <div class="tags-section">
        <p class="section-label">Tags</p>
        <mat-chip-grid #chipGrid aria-label="Enter tags" class="tags-grid">
          <mat-chip-row *ngFor="let tag of tags" (removed)="removeTag(tag)" class="custom-chip">
            #{{ tag }}
            <button matChipRemove aria-label="Remove tag">
              <mat-icon class="remove-icon">cancel</mat-icon>
            </button>
          </mat-chip-row>
          <input 
            placeholder="+ add tag"
            [matChipInputFor]="chipGrid"
            [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
            (matChipInputTokenEnd)="addTag($event)"
            class="tag-input"
          />
        </mat-chip-grid>
      </div>
    </form>
  </mat-dialog-content>

  <div class="form-footer">
    <button type="button" (click)="onCancel()" class="btn-cancel">
      Cancel
    </button>
    <button type="submit" form="noteForm" [disabled]="noteForm.invalid" class="btn-save">
      Save Note
    </button>
  </div>
  
</div>
