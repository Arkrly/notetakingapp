<article
  class="note-card group relative p-5 rounded-2xl transition-all duration-300 cursor-pointer hover:translate-y-[-4px] hover:shadow-lg hover:shadow-indigo-500/10"
  [ngClass]="[bgClass, borderClass]"
  (click)="onEditClick($event)"
>
  <!-- Pinned indicator -->
  <div
    *ngIf="note.isPinned"
    class="absolute -top-1 -right-1 w-6 h-6 bg-gradient-to-br from-amber-400 to-orange-500 rounded-lg shadow-md flex items-center justify-center transform rotate-12"
  >
    <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 17v5"></path>
      <path
        d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4.76z"
      ></path>
    </svg>
  </div>

  <div class="flex justify-between items-start gap-2 mb-2">
    <h3 class="font-bold text-base text-slate-800 leading-tight truncate flex-1">
      {{ note.title }}
    </h3>
    <button
      class="p-1.5 rounded-lg transition-all duration-200 opacity-0 group-hover:opacity-100 hover:bg-black/5"
      [class.opacity-100]="note.isPinned"
      (click)="onPinClick($event)"
    >
      <svg
        [ngClass]="note.isPinned ? 'text-amber-500' : 'text-slate-400'"
        class="w-4 h-4"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M12 17v5"></path>
        <path
          d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4.76z"
        ></path>
      </svg>
    </button>
  </div>

  <p class="text-sm text-slate-600 line-clamp-3 leading-relaxed">{{ note.content }}</p>

  <div class="flex flex-wrap gap-1.5 mt-3" *ngIf="tagList.length">
    <span
      *ngFor="let tag of tagList"
      class="px-2.5 py-1 text-[11px] font-semibold rounded-md whitespace-nowrap"
      [ngClass]="tagBgClass"
    >
      #{{ tag }}
    </span>
  </div>

  <!-- Action buttons - Always visible on mobile, hover on desktop -->
  <div class="flex items-center gap-1 mt-4 pt-3 border-t/50" [ngClass]="borderClass">
    <button
      mat-icon-button
      class="small-icon-btn h-8 w-8 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all duration-200"
      (click)="onEditClick($event)"
    >
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
    </button>
    <button
      mat-icon-button
      class="small-icon-btn h-8 w-8 text-slate-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition-all duration-200"
      (click)="onArchiveClick($event)"
    >
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 8v13H3V8"></path>
        <path d="M1 3h22v5H1z"></path>
        <path d="M10 12h4"></path>
      </svg>
    </button>
    <button
      mat-icon-button
      class="small-icon-btn h-8 w-8 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all duration-200 ml-auto"
      (click)="onDeleteClick($event)"
    >
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18"></path>
        <path
          d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
        ></path>
      </svg>
    </button>
  </div>

  <!-- Hover glow effect -->
  <div
    class="absolute inset-0 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"
    style="
      box-shadow:
        inset 0 0 0 2px rgba(99, 102, 241, 0.3),
        0 0 20px rgba(99, 102, 241, 0.1);
    "
  ></div>
</article>
