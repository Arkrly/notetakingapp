services:
  postgres:
    image: postgres:16-alpine
container_name: backend-db
  environment:
    POSTGRES_DB: backend
    POSTGRES_USER: backend_user
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backend_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_user -d backend"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: